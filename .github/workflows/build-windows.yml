name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode package -DskipTests

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: BlockGame-windows
          path: target/BlockGame.exe
          if-no-files-found: error

      - name: Upload self-contained bundle (no Java required)
        uses: actions/upload-artifact@v4
        with:
          name: BlockGame-windows-bundled
          path: target/BlockGame/
          if-no-files-found: error

      # ── Publish a rolling GitHub Release so the launcher can auto-update ──
      - name: Prepare release assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          # Zip the self-contained bundle (preserves BlockGame\ folder inside the zip)
          Compress-Archive -Path target\BlockGame -DestinationPath target\BlockGame-windows-bundled.zip

          # Write a tiny version file so the launcher can detect new builds cheaply
          "${{ github.run_number }}" | Set-Content -NoNewline target\version.txt

          # Write a launcher version file so the launcher can detect launcher updates
          "${{ github.run_number }}" | Set-Content -NoNewline launcher\launcher-version.txt

      - name: Publish latest-build release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release-notes.md << 'NOTES_EOF'
          Automatically built from the latest commit on `main`.

          ### How to use the launcher
          1. Download `BlockGameLauncher.bat` into any folder (one-time).
          2. Double-click it — if `BlockGameLauncher.ps1` is missing it is downloaded
             automatically, then the game is downloaded and kept up to date.
          3. A launcher window opens; click **Play** when ready.
          NOTES_EOF

          # Create the release if it does not exist yet; otherwise just re-upload assets.
          if gh release view latest-build --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload latest-build \
              target/BlockGame-windows-bundled.zip \
              target/BlockGame.exe \
              target/version.txt \
              launcher/BlockGameLauncher.ps1 \
              launcher/BlockGameLauncher.bat \
              launcher/launcher-version.txt \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create latest-build \
              --title "Latest Build" \
              --notes-file /tmp/release-notes.md \
              --prerelease \
              target/BlockGame-windows-bundled.zip \
              target/BlockGame.exe \
              target/version.txt \
              launcher/BlockGameLauncher.ps1 \
              launcher/BlockGameLauncher.bat \
              launcher/launcher-version.txt \
              --repo "$GITHUB_REPOSITORY"
          fi
